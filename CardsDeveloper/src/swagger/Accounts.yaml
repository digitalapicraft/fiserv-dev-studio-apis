    LenderInstitutionAddress:
      required:
        - addressLine1
        - city
        - state
        - zipCode
      type: object
      properties:
        addressLine1:
          maxLength: 26
          minLength: 1
          type: string
          description: Line 1 for address.
          example: 2921 CARLISLE BLVD NL
        city:
          maxLength: 25
          type: string
          description: City name for address.
          example: ALBUQUERQUE
        state:
          maxLength: 2
          type: string
          description: State code for address.
          example: NM
        zipCode:
          type: string
          description:
            'Zipcode for Address. Format: XXXXX-XXXX or just the first
            5 digits XXXXX'
          example: '12345'
    BalanceTransfer:
      title: BalanceTransfer
      required:
        - balanceTransferAmount
        - lenderInstitutionAddress
        - lenderInstitutionName
        - lenderNumber
      type: object
      properties:
        balanceTransferAmount:
          type: string
          description:
            Balance Amount to be transferred. Format should be 0.00. The
            currency is USD.
          example: '1.00'
        lenderInstitutionName:
          maxLength: 26
          minLength: 1
          type: string
          description: Transferring institution name.
          example: ABC Bank
        lenderNumber:
          type: string
          description: Number of the transferring institution.
          example: '4000100020003000'
        checkSendCode:
          type: string
          description:
            Code representing whether the balance consolidation check should
            be mailed to the customer or the lender.Valid values are C, L and P.
          example: L
        lenderInstitutionAddress:
          $ref: '#/components/schemas/LenderInstitutionAddress'
    BalanceTransferRequest:
      title: BalanceTransferRequest
      required:
        - balanceTransfer
        - cardNumber
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: The card number associated with the account.
          example: '4000100020003000'
        accountNumber:
          type: string
          description: Account identifier on the system of record.
          example: '123456789'
        balanceTransfer:
          $ref: '#/components/schemas/BalanceTransfer'
    AccountCreationResponse:
      type: object
      properties:
        accountNumber:
          type: string
          description: The newly generated account identifier.
          example: 400010XXXXXX3001
        cardNumber:
          type: string
          description: The newly generated primary card number.
          example: 400010XXXXXX3000
    AddNewAccountResponse:
      type: object
      properties:
        newAccount:
          type: array
          items:
            $ref: '#/components/schemas/AccountCreationResponse'
    AddNewAccountRequest:
      required:
        - address
        - agentIdentifier
        - creditLineAmount
        - pricingStrategy
        - primaryCardStock
        - primaryCustomerName
        - primaryPlasticCount
        - principalIdentifier
        - systemIdentifier
      type: object
      properties:
        responseFormat:
          type: string
          description:
            Determines how the user wants to see the response - masked
            or unmasked. This is an optional field and if not provided, then MASKED
            will be the default value.
          example: MASKED
          enum:
            - MASKED
            - UNMASKED
        systemIdentifier:
          type: string
          description:
            First Data-assigned identifier which is used to group principal
            identifiers together for processing and reporting. Valid length is 4 digits.
          example: '3771'
        principalIdentifier:
          type: string
          description:
            Client-defined identifier within a system identifier that is
            used to group agent identifiers together for processing and reporting.
            Valid length is 4 digits.
          example: '0050'
        agentIdentifier:
          type: string
          description:
            Client-defined identifier within a principal identifier that
            is used to group accounts together for processing and reporting. Valid
            length is 4 digits.
          example: '0000'
        primaryCustomerName:
          maxLength: 26
          minLength: 1
          type: string
          description: Primary cardholder’s name on account.
          example: Doe, John
        creditLineAmount:
          maxLength: 13
          type: string
          description: Amount of the credit limit on a customer's account.
          example: '100'
        primarySpecialHandling:
          type: string
          description:
            This indicate what value needs to be passed for rush type and
            plastic count while adding a new primary card. For instant issuance -
            primaryPlastiCount needs to be 000.
          example: NONE
          enum:
            - NONE
            - INSTANT_ISSUANCE
            - RUSH_PLASTIC
        primaryCardStock:
          maxLength: 2
          minLength: 2
          type: string
          description: Value to identify type of plastic stock to use for card generation.
          example: '00'
        pricingStrategy:
          maxLength: 8
          type: string
          description:
            The account's pricing strategy. Can be alphanumeric, but not
            special characters.
          example: AA01
        primaryPlasticCount:
          maxLength: 3
          minLength: 1
          type: string
          description: Number of plastics to be issued for primary cardholder.
          example: '001'
        primaryPersonalizedEmbossingText:
          maxLength: 26
          type: string
          description:
            Cardholder particular information, such as name, is printed
            in the form of a customised text message.
          example: Home Team
        primaryWorkEmailAddress:
          maxLength: 50
          type: string
          description: Primary cardholder's work email address.
          example: john.work@fiserv.com
        primaryHomeEmailAddress:
          maxLength: 50
          type: string
          description: Primary cardholder's home email address.
          example: john@gmail.com
        primaryMothersMaidenName:
          maxLength: 8
          type: string
          description: Mother's maiden name of the primary account owner.
          example: Smith
        primaryBirthDate:
          type: string
          description: Birth date for account owner.
          format: YYYY-MM-DD
          example: '1986-10-29'
        primarySsn:
          type: string
          description:
            The social security number or tax identifier of the primary
            cardholder. The valid length of social security is  9 and that of tax
            identifier is 24 characters.
          example: '123456789'
        primaryTaxId:
          type: string
          description:
            The tax identifier of the primary cardholder. The valid length
            of tax identifier is 24 characters.
          example: '23456789567'
        primaryHomePhoneNumber:
          maxLength: 18
          type: string
          description: Home telephone number of the primary account owner.
          example: '1005550001'
        primaryWorkPhoneNumber:
          maxLength: 18
          type: string
          description: Work telephone number of the primary account owner.
          example: '1005550002'
        primaryMobilePhoneNumber:
          maxLength: 18
          type: string
          description: Mobile number of the primary account owner.
          example: '1005550003'
        primaryFaxPhoneNumber:
          maxLength: 19
          type: string
          description: Fax number of the primary account owner.
          example: '1005550004'
        primaryClientDefinedNumber:
          maxLength: 18
          type: string
          description: Primary cardholder’s client defined phone number
          example: '0'
        primaryCreditBureauName:
          type: string
          description:
            Credit Bureau that provided the credit bureau score for primary
            cardholder ex 1-TransUnion, 2-Equifax, 3-Experian, 5-TransUnion Canada,
            6-Equifax Canada, 7 - Reserved for future use
          example: '1'
        primaryCreditBureauScoreDate:
          type: string
          description: Primary cardholder’s credit bureau score date YYMMDD
          format: YYYY-MM-DD
          example: '2025-08-08'
        primaryCreditBureauScoreNumber:
          type: string
          description:
            Primary cardholder’s credit bureau score number. It is a numeric
            value
          example: '123'
        primaryVerificationCode:
          type: string
          description:
            'Primary cardholder’s ID Type used for verification.Valid values
            are : 01,02,03,04,05,06,07,08,09,10,11,12,13,14,15,16,91'
          example: 09
        primaryCustomerIdDescription:
          type: string
          description:
            "Primary cardholder’s ID description for the verification code\
            \ provided. Valid values - \n- 01 - Client Controlled Customer Identifier\
            \ (CCC ID). \n- 02 - Canadian Social Insurance Number (SIN). \n- 03 -\
            \ Passport. \n- 04 - Government issued employer identification (e.g.,\
            \ EIN/TIN). \n- 05 - Alien identification number (e.g., I-551/Greencard).\
            \ \n- 06 - Other government issued photo identification (e.g., Military\
            \ ID or Matricula Consular card). \n- 07 - U.S. Social Security number\
            \ (SSN)/Individual Taxpayer Identification Number (ITIN). \n- 08 - Non-U.S.\
            \ taxpayer identification number (e.g., Mexican RFC). \n- 09 -  Driver’s\
            \ license. \n- 10 - National identification card. \n- 11 - Birth certificate.\
            \ \n- 12 - Marriage certificate. \n- 13 - Religious certificate (e.g.,\
            \ baptismal/christening certificate). \n- 14 - Voter registration identification\
            \ card. \n- 15 - Employer-issued employee identification. \n- 16 - Military\
            \ discharge (e.g., DD-214). \n- 91 - Other identification type (e.g.,\
            \ non-photo identifications) "
          example: '0'
        primaryCustomerIdExpirationDate:
          type: string
          description:
            The expiration date of the verification document that was provided
            in the customer description. Like, the expiration date of driver's license.
          format: YYYY-MM-DD
          example: '2024-12-12'
        primaryCustomerIdValue:
          maxLength: 30
          type: string
          description:
            The value of the verification code used. Like, the value of
            driver's license.
          example: I12345678
        primaryCustomerIdIssueDate:
          type: string
          description:
            The issue date of the verification document that was provided
            in the customer description. Like, the issue date of driver's license.
          format: YYYY-MM-DD
          example: '2024-12-12'
        billingCycleCode:
          maxLength: 2
          minLength: 2
          type: string
          description: Cycle code to identify when account will statement cycle
          example: '28'
        accountOwningBranch:
          maxLength: 5
          type: string
          description:
            The number of the branch that owns this account. Number identifying
            the bank that owns this account. Maximum length is 5 digits.
          example: '67862'
        dnaPersonNumber:
          maxLength: 9
          minLength: 1
          type: string
          description:
            This is an alphanumeric field used for core reporting on balance
            & status file.
          example: 78GH
        checkingsAccountNumber:
          type: string
          description: Cardholders checking account number
          example: '123456789'
        savingsAccountNumber:
          type: string
          description: Cardholders saving account number
          example: '123456789'
        accountCreditBureauReportCode:
          type: string
          description:
            "Credit Bureau code for the account. Valid values are - \n\
            - 1 - Individual. \n- 2 - Joint. \n- 3 - Authorized user. \n- 5 - Co-maker.\
            \ \n- 7 - Maker. \n- D - Request deletion. \n- R - Remove. \n- T - Terminate.\
            \ \n- W - Commercial. \n- X - Deceased. \n- Z - Do not report."
          example: Z
        militaryLendingActStatus:
          type: boolean
          description:
            Flag that indicates this the borrower is covered under the
            Military Lending Act
          example: false
        productTypeCode:
          type: string
          description:
            The product type of the account. Upto 3 bytes value. Default
            value is 001 for secured cards.
          example: '001'
        transitRoutingAccount:
          type: string
          description: Cardholders bank routing number. Maximum length is 9
          example: '123456789'
        payAheadCode:
          type: string
          description:
            "The code representing whether an account holder can pay more\
            \ than the minimum payment due for one cycle in order to cover the minimum\
            \ payment due for the next cycle. \n- 0 - Cardholder does not have the\
            \ pay ahead option. \n- 1 - The cardholder’s first payment posting after\
            \ the flag is set, and prior to statement cycling, applies as a pay ahead\
            \ payment. The system limits this code to one-cycle-use only. When the\
            \ account cycles, the system automatically resets the flag to zero to\
            \ prevent any additional payments from being applied to the pay ahead\
            \ field.  The system applies any amount in excess after the cardholder\
            \ pays the minimum payment due to future minimum payment due calculations.\
            \  This continues until the system reduces the pay ahead amount to zero.\
            \ \n- 7 - Turn pay ahead option off. Excess payment amounts do not qualify\
            \ for pay ahead. \n-8 - All payments posting to the cardholder’s account\
            \ are option 3 pay ahead payments. All payments that post to the account\
            \ before it cycles reduce the account balance and the system adds the\
            \ payments to the pay ahead field. The sum of all payments must be double\
            \ the amount of the calculated minimum payment due before the pay ahead\
            \ field applies to the minimum payment. After the account cycles, the\
            \ system reduces the accumulated amount in the pay ahead field to zero.\
            \ The flag remains set to 8 after the system generates the statement.\
            \ This permits all payments posting during the next cycle to apply to\
            \ the pay ahead field. \n- 9 - All payments posting to the cardholder’s\
            \ account are option 1 pay ahead payments. All payments that post to the\
            \ account during a cycle reduce the account balance and apply in full\
            \ to the pay ahead field. If the amount in this field exceeds the computed\
            \ minimum payment due at cycle time, the system retains this excess and\
            \ applies it to future minimum payment due calculations. This continues\
            \ until the amount in the pay ahead amount is reduced to zero."
          example: '0'
        automaticPaymentCode:
          type: string
          description:
            "Code representing whether the customer account is set up for\
            \ recurring automatic payments and, if so, whether to debit the customer’s\
            \ checking or savings account for the auto payment amount. Valid codes\
            \ are : \n- 0 - Do not calculate an automatic payment. \n- 1 - Unpaid\
            \ billed minimum payment due using the checking account. \n- 2 - Full\
            \ statemented balance or unpaid billed minimum payment due using the checking\
            \ account. \n- 3 - Full statemented balance, but will not subtract any\
            \ cycle to date disputes, adjustments, or payments. \n- 4 - Full statemented\
            \ balance using the checking account. \n- 5 - Unpaid billed minimum payment\
            \ due using the savings account. \n- 6 - Full statement ed balance or\
            \ unpaid billed minimum payment due using the savings account. \n- 7 -\
            \ Full statemented balance using the savings account. \n- 8 - Full statemented\
            \ balance, and will not subtract any cycle-to-date disputes or adjustments\
            \ but will subtract any cycle-to-date payments. \n- 9 - Higher of the\
            \ customer-designated amount or the unpaid billed minimum payment due.\
            \ \n- A - Minimum payment due minus the delinquent amount using the checking\
            \ account. \n- B - Minimum payment due minus the delinquent amount using\
            \ the savings account. \n- C - Last statemented balance times balance\
            \ calculation rate using the checking account. \n- D - Last statemented\
            \ balance times balance calculation rate using the savings account. \n\
            - E - Full balance amount using the checking account. \n- F - Full balance\
            \ amount using the savings account number. \n- G - Minimum payment due\
            \ minus cycle-to-date payments, returns, and special credits using the\
            \ checking account. \n- H - Customer designated amount plus unpaid billed\
            \ minimum payment due using the checking account. \n- I - Minimum payment\
            \ due minus cycle-to-date payments, returns, and special credits using\
            \ the savings account. \n- J - Customer designated amount using the checking\
            \ account. \n- K - Customer designated amount using the savings account.\
            \ \n- L - Customer designated amount minus cycle-to-date payments, returns,\
            \ and special credits using the checking account. \n- M - Customer designated\
            \ amount minus cycle-to-date payments, returns,and special credits using\
            \ the savings account. \n - N - Daily current balance option using the\
            \ checking account. \n- O - Daily current balance option using the savings\
            \ account. \n- P - Fixed payment amount minus any cycle-to-date payments\
            \ using the checking account. \n- Q - Fixed payment amount minus any cycle-to-date\
            \ payments using the savings account. \n- R - Customer designated amount\
            \ plus overlimit amount using the checking account. \n- S - Customer designated\
            \ amount plus overlimit amount using the savings account. \n- T - Unpaid\
            \ billed minimum payment due plus overlimit amount using the checking\
            \ account. \n- U - Unpaid billed minimum payment due plus overlimit amount\
            \ using the savings account. \n- V - Customer designated amount less any\
            \ cycle to date payments using the checking account. \n- W - Customer\
            \ designated amount less any cycle to date payments using the savings\
            \ account. \n- X - Customer designated amount plus unpaid billed minimum\
            \ payment due using the savings account. \n- Y - Customer designated amount\
            \ plus unpaid billed minimum payment due plus overlimit amount using the\
            \ checking account. \n- Z - Customer designated amount and unpaid billed\
            \ minimum payment due plus overlimit amount using the savings account."
          example: '0'
        firstEmployerName:
          maxLength: 26
          type: string
          description: Cardholders first employer name
          example: XYZ
        secondEmployerName:
          maxLength: 26
          type: string
          description: Cardholders second employer name
          example: ABC
        fixedPaymentAmount:
          type: string
          description: Cardholder fixed payment amount
          example: '0'
        autoPaymentDesignatedAmount:
          type: string
          description:
            The amount the customer agreed to pay via the automatic payment
