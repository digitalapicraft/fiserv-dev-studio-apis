            Service (MCAS). B - Response was provided by the Visa Transaction Advisor
            Service C - Authorization was approved offline by MCAS for randomly selected
            online transaction with no response. E - Authorization was approved offline,
            authorization code was entered manually L - Late clearing - authorization
            previously obtained (clearing beyond 30 days) N - No authorization required;
            below floor limit V - Authorization obtained via VisaNet (Issuer or STIP
            response) 0 - Advice of exception file update. 1 - Response was STIP,
            time out. 2 - Response was LCS, amount below issuer limit. 3 - Response
            was STIP, issuer in suppress-inquiry mode. 4 - Response was STIP, issuer
            unavailable. 5 - Authorization was approved by issuer. 6 - Authorization
            was approved offline, generated by POS-device 7 - Authorization was approved
            by the acquirer 9 - Authorization source code was not provided, non-authorized
            transaction
          example: A
