  /v1/accounts/statements/search:
    post:
      tags:
        - Statements
      description: 'Search for statement information given the account'
      operationId: getStatements
      parameters:
        - name: x-fapi-userId
          in: header
          description:
            User on behalf of whom the request is being made. userId must
            be alphanumeric.
          required: false
          style: simple
          explode: false
          schema:
            type: string
          example: JOHNDOE
        - name: x-fapi-financial-id
          in: header
          description:
            The 8-digit unique financial institute id assigned to each FI
            by Fiserv.
          required: true
          style: simple
          explode: false
          schema:
            type: string
          example: 0012345678
        - name: filter
          in: query
          description:
            "Retrieve summary or detail information of statement. Default\
            \ will be 'summary'.  \n\nfilter value 'summary' only includes the following\
            \ fields  \n- cardNumber  \n- statementDate  \n- statementEndingBalance\
            \  \n- delinquentAmount \n- statementFinanceChargeAmount  \n- minimumPaymentDueAmount\
            \  \n- paymentDueDate  \n\nfilter value of 'detail' includes all the fields\
            \ in the response.\n"
          required: false
          style: form
          explode: true
          schema:
            type: string
          example: summary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatementSearchRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementSearchResponse'
              examples:
                Statement Search - Summary:
                  $ref: '#/components/examples/StatementSearchResponseSummary'
                Statement Search - Detail:
                  $ref: '#/components/examples/StatementSearchResponseDetail'
        '206':
          description: Partial Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementSearchResponse'
        '400':
          description: Invalid Request
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/interactionId'
          content:
            application/json:
              schema:
