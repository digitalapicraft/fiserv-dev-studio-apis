          example: '0'
        automaticPaymentCode:
          type: string
          description: Payment code for the account.
          example: '4'
        automaticPaymentFlag:
          type: string
          description:
            "Indicates the use of the automatic payment option. If used,\
            \ this determines if the payment is automatically deducted from a cardholder’s\
            \ checking or savings account. \nThis flag also determines the production\
            \ of hard copy debit memos or Automated Clearinghouse (ACH) tapes.  \n\
            - blank - Do not use the automatic payment option  \n- 0 - Use the automatic\
            \ payment option. Create debit memos as hard copy.  \n- 1 - Reserved for\
            \ future use.  \n- 2 - Use the automatic payment option. The Federal Reserve\
            \ receives an ACH tape with offsets at the principal level. The System\
            \ automatically deducts payment from the cardholder’s checking or savings\
            \ account.  \n- 3 - Use the automatic payment option. The Federal Reserve\
            \ receives an ACH tape with offsets at the agent level. The System automatically\
            \ deducts payment from the cardholder’s checking or savings account. \
            \ \n- 4 - Use the automatic payment option. The principal receives an\
            \ ACH tape with offsets at the principal level. The System does not automatically\
            \ deduct payment from the cardholder’s checking or savings account. Use\
            \ code 4 if you want to verify that funds exist in the cardholder’s checking\
            \ or savings account before deducting the payment.  \n- 5 - Use the automatic\
            \ payment option. The system receives an ACH tape with offsets at the\
            \ principal level. The System automatically deducts payment from the cardholder’s\
            \ checking or savings account.  \n- 6 - Use the automatic payment option.\
            \ The system receives an ACH tape with offsets at the agent level. The\
            \ System automatically deducts payment from the cardholder’s checking\
            \ or savings account.  \n- 7 - Use the automatic payment option. The principal\
            \ receives an ACH tape with offsets at the principal level. The System\
            \ automatically deducts payment from the cardholder’s checking or savings\
            \ account.  \n- 8 - Use the automatic payment option. The principal receives\
            \ an ACH tape with offsets at the agent level. The System automatically\
            \ deducts payment from the cardholder’s checking or savings account. \
            \ \n- 9 - Use the automatic payment option. The agent receives an ACH\
            \ tape with offsets at the agent level. The System automatically deducts\
            \ payment from the cardholder’s checking or savings account.\n"
          example: '1'
        automaticPaymentSwitch:
          type: string
          description:
            'Flag determining the use of the automatic payment option If
            used, this flag also identifies whether to automatically deduct the payment.from
            a cardholder’s checking or savings account. This flag also determines
            theproduction of hard copy debit memos or Automated Clearinghouse (ACH)
            tapes. '
