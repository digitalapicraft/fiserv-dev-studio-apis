openapi: 3.0.0
info:
  title: Accounts
  description: Accounts Domain. All times will be in UTC standards.
  version: 3.3.0-Oct-25
servers:
  - url: https://card.api.fiservapps.com/cs/accounts
    description: Production url
  - url: https://card-sandbox.api.fiservapps.com/cs/accounts
    description: Sandbox url
security:
  - BearerAuth: []
tags:
  - name: Add
    description: Add new account
  - name: Authorization
    description: Create, cancel authorization
  - name: Batch Processing
    description: Submit batch adjustments
  - name: Details
    description: Get the details of the account
  - name: Limits
    description:
      Update the credit limit, cash limit, or the temporary credit limit
      based on account number.
  - name: Statements
    description: Search for Account statements.
  - name: Transactions
    description: Search for Account transactions.
paths:
  /v1/accounts/create:
    post:
      tags:
        - Add
      description: 'Add a new account'
      operationId: addNewAccount
      parameters:
        - name: x-fapi-userId
          in: header
          description:
            User on behalf of whom the request is being made. userId must
            be alphanumeric.
          required: false
          style: simple
          explode: false
          schema:
            type: string
          example: JOHNDOE
        - name: x-fapi-financial-id
          in: header
          description:
            The 8-digit unique financial institute id assigned to each FI
            by Fiserv.
          required: true
          style: simple
          explode: false
          schema:
            type: string
          example: '12345678'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddNewAccountRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddNewAccountResponse'
        '400':
          description: Invalid Request
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/interactionId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxError'
        '401':
          description: Unauthorized access
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/interactionId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxError'
        '403':
          description: Forbidden
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/interactionId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxError'
        '404':
          description: Not Found
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/interactionId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxError'
        '405':
          description: Method Not Allowed
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/interactionId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxError'
        '406':
