            \ VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands\
            \ (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin |\
            \ WY Wyoming\n"
          example: NJ
        postDate:
