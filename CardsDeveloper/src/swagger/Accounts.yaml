            - NORMAL
            - AUTHORIZATION_PROHIBITED
            - BANKRUPT
            - CLOSED
            - FROZEN
            - INTEREST_PROHIBITED
            - REVOKED
            - CHARGED_OFF
        accountStatusReason:
          type: string
          description:
            "Reason for the account status.\n\n- 00 - Normal  \n- 10 -\
            \ Natural disaster  \n- 35 - Account in Collections  \n- 68 - Legally\
            \ paid in full for less than the full balance  \n- 80 - Charged off account\
            \ paid in full  \n- 85 - Closed due to Adaptive Control overlimit strategy\
            \  \n- 86 - Closed due to Adaptive Control delinquent strategy  \n- 87\
            \ - Closed due to Adaptive Control reissue strategy  \n- 88 - Fraud  \n\
            - 89 - Bankrupt  \n- 91 - Closed due to account transfer  \n- 90 - Closed\
            \ due to delinquency action code  \n- 92 - Closed in the reissue process\
            \ due to delinquent and overlimit  \n- 93 - Closed in the reissue process\
            \ due to REISSUE TERMS  \n- 94 - Closed in the reissue process due to\
            \ INCLUDE/EXCLUDE STATES  \n- 95 - Closed in the reissue process due to\
            \ an external status other than 'A' or space  \n- 96 - Closed in the reissue\
            \ process due to inactive option  \n- 97 - Closed by customer  \n- 98\
            \ - Closed by FI  \n- 99 - Abandoned  \n- nn - Undefined  \n"
          example: 00–Normal
        accountType:
          type: string
          description:
            "The type of the account.\n- Control \n- Individual Pay  \n\
            - Sub-Account\n- Consumer\n"
          example: Consumer
        accountTransferStatus:
          type: string
          description: 'Type of account transfer performed.

            - NO_TRANSFER_INVOLVEMENT - no transfer involvement on this account

            - ORIGINAL_TRANSFER_ACCOUNT - original transfer account (aka from account)

            - NEW_TRANSFER_ACCOUNT - new transfer account (aka to account)

            - ORIGINAL_ACCOUNT - original account (aka from combined account)

            - NEW_COMBINED_ACCOUNT - new combined account (aka to combined account)

            '
          example: NO_TRANSFER_INVOLVEMENT
          enum:
            - NO_TRANSFER_INVOLVEMENT
            - ORIGINAL_TRANSFER_ACCOUNT
            - NEW_TRANSFER_ACCOUNT
            - ORIGINAL_ACCOUNT
            - NEW_COMBINED_ACCOUNT
