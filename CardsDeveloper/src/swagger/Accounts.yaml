        secondaryFaxPhoneNumber:
          maxLength: 19
          type: string
          description: Fax number of the secondary cardholder.
          example: '1005550004'
        secondaryHomePhoneNumber:
          maxLength: 18
          type: string
          description: Secondary cardholder’s home phone number
          example: '1005550001'
        secondaryMobilePhoneNumber:
          maxLength: 18
          type: string
          description: Secondary cardholder’s mobile phone number
          example: '1005550001'
        secondaryWorkPhoneNumber:
          maxLength: 18
          type: string
          description: Secondary cardholder’s work phone number
