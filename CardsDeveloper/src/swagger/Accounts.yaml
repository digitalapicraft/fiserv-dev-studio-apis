            is used to group accounts together for processing and reporting. Valid
            length is 4 digits.
          example: '0'
        agentNumber:
          type: string
          description: Identifier of the agent.
          example: '0'
        alternateAccountIdentifier:
          type: string
          description: Client-assigned alternate account identifier.
          example: xxxxx6789
