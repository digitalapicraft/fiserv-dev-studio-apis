        - cardExpiratioDate
        - forceAuthorization
      type: object
      properties:
        authorizationType:
          type: string
          description:
            'Type of the authorization that will be created. Possible values:
            Cash Advance and Merchandise.'
          example: CASH_ADVANCE
          enum:
            - CASH_ADVANCE
            - MERCHANDISE
        authorizationAmount:
          type: string
          description: Amount to be authorized.
          example: '2.30'
        merchantAccountIdentifier:
          type: string
          description:
            Account number that identifies the merchant.This is mandatory
            when the authorization type is - MERCHANDISE and optional for CASH_ADVANCE.
          example: '12345678'
        forceAuthorization:
          type: boolean
          description: Indicate if bypass a declined authorization and force the authorization.
          example: true
        authorizationCode:
          type: string
          description: Approval Code Authorization approval code assigned by the system.
          example: 029851
        cardExpirationDate:
          type: string
          description: Card expiration date.
          format: MM/YY
          example: 10/10
        previousTransactionAmount:
          type: string
          description:
