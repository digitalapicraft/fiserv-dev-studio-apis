            \ GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana\
            \ | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH\
            \ Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)\
            \  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS\
            \ Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada |\
            \ NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC\
            \ North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US\
            \ Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio\
            \ | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US\
            \ Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL\
            \ Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina |\
