          description: Client defined field with maximum length 50
          example: ABC
        primaryUniqueId:
          type: string
          description:
            Primary cardholder’s ID record. Default to 01 when primaryCustomerIdDescription
            has value or else pass 00. Numeric only.
          example: '0'
        issuingCountryCode:
          type: string
          description:
            This field will be used when the primaryVerificationCode has
            value 09-Driver's license. This field denotes the country code where the
            driver's license was issued. ISO Country codes with max length 3.
          example: USA
        issuingState:
          type: string
          description:
            This field will be used when the primaryVerificationCode has
            value 09-Driver's license. This field denotes the state where the driver's
            license was issued. Maximum length is 25
          example: Nebraska
        creditInsuranceCode:
          type: string
          description:
            Code representing the type of rate you charge the cardholder
            account’s credit life insurance premium. This is only numeric with max
            length 1. A zero in this field indicates that you do not charge credit
            insurance premiums. Values 1 through 9 indicate that you charge the credit
            insurance premium  If you use this field to reinstate credit insurance
            coverage that has been terminated due to account delinquency, you must
            remove the account’s delinquency status before reinstating coverage.
          example: '0'
        creditProtectProductId:
          type: string
          description:
            Client-defined identifier of the credit protection product
            with max length 2, can be alphanumeric
          example: A0
        creditProtectMarketCode:
          type: string
          description:
            When utilizing Credit Protection Product ID to place insurance,
            a value of 000 needs to be sent in otherwise null.
          example: '000'
        applicationOfficerId:
          type: string
          description:
            ID of bank officer who approved application.Maximum length
            7, numeric.
          example: '0100235'
        controlAccountId:
          type: string
          description:
            Commercial card control account number - this is for commercial
            cards only. The account number entered into this field will become a control
            account and the new  account will become a sub-account underneath it
          example: '123456789'
        companyIdentifier:
          type: string
          description: Company Identifier - for commercial cards only
          example: TEST0002
        address:
          $ref: '#/components/schemas/AddNewAccountAddress'
    AddNewAccountAddress:
      required:
        - addressLine1
        - city
        - country
        - state
        - zipCode
      type: object
      properties:
        addressLine1:
          maxLength: 50
          minLength: 1
          type: string
          description: Text containing the first line of the company mailing address.
          example: 123 Any Street
        addressLine2:
          maxLength: 50
          type: string
          description: Text containing the second line of the mailing address.
          example: Apt 100
        addressLine3:
          maxLength: 50
          type: string
          description: Text containing the third line of the mailing address.
          example: PARSIPPANY
        addressLine4:
          maxLength: 50
          type: string
          description: Text containing the fourth line of the mailing address.
          example: NJ
        country:
          maxLength: 3
          type: string
          description:
            ISO code representing the country of the company-related commercial
            card address. It is a three-position code for a First Data-supported country.
          example: USA
        state:
          maxLength: 2
          type: string
          description: Name of the state.
          example: NJ
        zipCode:
          maxLength: 14
          type: string
          description: Postal code or zipcode associated with the address.
          example: '07054'
        city:
          maxLength: 25
          type: string
          description: City in which the company is located.
          example: Parsippany
        isFormattedAddress:
          type: boolean
          description:
            Indicates if address is an US address or international address.
            If set to true- Address Line 3 & 4 should be blank.
        primaryAddressCode:
          type: string
          description:
            Code representing the type of address displayed. - B - Business
            Street Address, H - Home or Residence Street Address, O - Other,U - Unknown.
          example: B
    CancelAuthorizationRequest:
      required:
