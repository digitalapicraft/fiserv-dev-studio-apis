    LimitsRequest:
      required:
        - accountNumber
      type: object
      properties:
        accountNumber:
          type: string
          description: Account identifier on the system of record.
          example: '123456789'
        creditLimit:
          maximum: 999999999999999
          type: string
          description:
            Credit limit for the account, provide in whole monetary units.
            User cannot update if a temporary credit limit is in effect.
          example: '3000'
        cashLimit:
          $ref: '#/components/schemas/UpdateCashLimit'
        temporaryCreditLimit:
          $ref: '#/components/schemas/UpdateTemporaryCreditLimit'
    StatementSearchRequest:
      title: StatementSearchRequest
      required:
        - accountNumber
      type: object
      properties:
        accountNumber:
          type: string
          description: Account identifier on the system of record.
          example: '123456789'
        priorAccountNumber:
          type: string
          description: Migrated account number.
          example: '987456123'
        fromDate:
          type: string
          description:
            Defines the starting date range covered by the statement. If
            fromDate is given, toDate is required. If not given, the response will
            show 3 months of statement data.
          format: date
        toDate:
          type: string
          description:
            Defines the ending date range covered by the statement. If
            toDate is given, fromDate is required. If not given, the response will
            show 3 months of statement data.
          format: date
    StatementSearchResponse:
      type: object
      properties:
        cardNumber:
          type: array
          description:
            Between 16 and 19 digits for card number identifier. Applies
            to both summary and detail responses. Displays all the card numbers associated
            with the account passed in the request.
          example:
            - '4257691000200020'
            - '4257691000200021'
          items:
            type: string
        statementDetails:
          type: array
          items:
            $ref: '#/components/schemas/StatementDetails'
        warningInfo:
          $ref: '#/components/schemas/Warning'
    StatementDetails:
      title: StatementDetails
      type: object
      properties:
        statementDate:
          type: string
          description: Date on which the statement was produced.
          format: date
        statementEndingBalance:
          type: string
          description:
            Ending balance of the account on this statement. Negative balances
            denoted with a negative sign such as -1500.00.
          example: '1500.00'
        delinquentAmount:
          type: string
          description:
            Total amount billed as past due at the time the statement was
            generated.
          example: '100.00'
        statementFinanceChargeAmount:
          type: string
          description:
            Amount that is charged on the balance that is carried from
            one payment period to next.
          example: '10.00'
        minimumPaymentDueAmount:
          type: string
          description:
            Minimum amount required to pay on or before the payment due
            date to avoid a late fee. It is lower than the total outstanding balance.
          example: '200.00'
        paymentDueDate:
          type: string
          description:
            Date by which credit card bill must be paid. Applies to both
            summary and detail responses.
          format: MM-DD
          example: 12-25
        statementOpeningBalanceAmount:
          type: string
          description: Balance for this account at the beginning of the cycle.
          example: '3000.00'
        statementDebitAmount:
          type: string
          description: Used to calculate Total amount of debit transactions.
          example: '1500.00'
        statementSalesAmount:
          type: string
          description: Used to calculate Total amount of sales transactions.
          example: '12.09'
        statementOtherCreditsAmount:
          type: string
          description: Used to calculate Total amount of credit transactions.
          example: '15.15'
        statementPaymentAmount:
          type: string
          description: Used to calculate Total amount of payment transactions.
          example: '400.00'
        accountStatusCode:
          type: string
          description:
            Status code and description assigned to the account that indicates
            an account has a special condition that drives authorization declines,
            card reissue, letter suppression, statement generation, waiving finance
            charges/fees, and reporting.
          example: NORMAL
          enum:
            - NORMAL
            - AUTHORIZATION_PROHIBITED
            - BANKRUPT
            - CLOSED
            - FROZEN
            - INTEREST_PROHIBITED
            - REVOKED
            - CHARGED_OFF
        yearToDateInterestAmount:
          type: string
          description:
            Finance charges amount assessed from the beginning of the calendar
            year through the end of year statement.
          example: '30.00'
        purchaseCount:
          type: integer
          description: Total number of debit transactions posted to the account.
          example: 15
        creditCount:
          type: integer
          description: Total number of credit transactions posted to the account.
          example: 5
        paymentsCount:
          type: integer
          description: Total number of payment transactions posted to the account.
          example: 10
        daysInBillingCycle:
          type: integer
          description: Number of days in one billing cycle covered by the statement.
          example: 31
        billingCycleCode:
          type: integer
          description:
            Code assign to each billing cycle. Billing cycle is the length
            of time between the last statement closing date and the next closing date.
          example: 28
        sinceLastStatementInterestAmount:
          type: string
          description: Amount of interest charged from last cycle.
          example: '1.09'
        overlimitFees:
          type: string
          description: Fee charged when balance goes over the credit limit.
          example: '5.00'
        skipPaymentFlag:
          type: string
          description:
            Indicates if there is an account-level skip payment in effect.
            Values are either "Yes" or "No".
          example: 'No'
        statementCreditLineAmount:
          type: string
          description: Total credit limit established for the account.
          example: '5000.00'
        availableCreditRemaining:
          type: string
          description: Total credit limit amount available on the account.
          example: '4000.00'
        statementTotals:
          $ref: '#/components/schemas/StatementTotals'
        statementTransactionDetails:
          $ref: '#/components/schemas/StatementTransactionsResponse'
    StatementTotals:
      title: StatementTotals
      type: object
      properties:
        adjustments:
          type: string
          description: Total adjustment transaction amount in statement.
          example: '99485.00'
        cashAdvance:
          type: string
          description: Total cash advance transaction amount in statement.
          example: '1692.00'
        credit:
          type: string
          description: Total credit transaction amount in statement.
          example: '10100.00'
        payment:
          type: string
          description: Total payment transaction amount in statement.
          example: '665572.00'
        purchase:
          type: string
          description: Total purchase transaction amount in statement.
          example: '39181.00'
    pdfIdsResponse:
      title: pdfIDsResponse
      type: object
      properties:
        pdfs:
          type: array
          description:
            The list of PDFs with their statement date, link to download,
            and the unique identifer of the statement found and used answer the specific
            request.
          items:
            $ref: '#/components/schemas/pdfDetails'
    pdfDetails:
      title: PdfDetails
      type: object
      properties:
        statementDate:
          type: string
          description: The unique statement identifier related to the documentId.
          format: Date
          example: 2022-05-31T00:00:00.000+0000
        docId:
          type: string
          description: The specific document Id reference to get the pdf binary.
          example: E68A974727A06929B786939B8C68B030CA4E56A3079985834543673C575B740FBE67229617FB
        link:
          type: string
          description: The link to GET call for the PDF Binary file of the statement.
          example: https://card.dsp.apimz.onefiserv.net/v2/statements/search/pdf/E68A974727A06929B786939B8C68B030CA4E56A3079985834543673C575B740FBE67229617FB
    StatementTransactionsResponse:
      title: StatementTransactionsResponse
      type: object
      properties:
        totalTransactionsCount:
          type: integer
          description: Total number of transactions reported in the returned statements.
          example: 1200
        statementTransactions:
          type: array
          items:
            $ref: '#/components/schemas/StatementTransaction'
    StatementTransaction:
      title: StatementTransaction
      type: object
      properties:
        cardOrAccountNumber:
          type: string
          description: Card number or account number associated with the transaction.
          example: '4000200030004000'
        cardOrAccountTransactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionsForCardOrAccountResponse'
    TransactionsForCardOrAccountResponse:
      title: TransactionsForCardOrAccount
      type: object
      properties:
        authorizationCode:
          type: string
          description: Authorization approval code for the transaction.
          example: '606'
        currencyCode:
          type: string
          description:
            Code representing the type of currency involved in the transaction.
            This is the ISO 4217 three-digit code.
          example: '840'
        issuerAmount:
          type: string
          description: Amount of the transaction.
          example: '10.00'
        merchandiseDescription:
          type: string
          description: Merchandise description of the transaction.
          example: shoes
        merchantAccount:
          type: string
          description: Merchant account number associated with the transaction.
          example: '1234567890124067'
        merchantCategoryCode:
          type: string
          description: Merchant category code (MCC) associated with the transaction.
          example: '6010'
        merchantDescription:
          type: string
          description: Description of the merchant in the transaction.
          example: Store1
        merchantCity:
          type: string
          description: Name of the city in which the merchant is located.
          example: Newark
        merchantState:
