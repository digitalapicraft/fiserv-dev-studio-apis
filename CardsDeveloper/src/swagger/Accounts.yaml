    UpdateCashLimit:
      title: CashLimit
      required:
        - limitType
      type: object
      properties:
        limitType:
          type: string
          description: Indicates type of cash limit.
          enum:
            - AMOUNT
            - PERCENT
        amount:
          maximum: 9999999999
          type: string
          description:
            Cash limit amount, provide in whole monetary units. If the
            limitType is AMOUNT, this field is required.
          example: '2000'
        percent:
          maximum: 100
          type: string
          description:
            Provide the percent of the credit limit used to calculate the
            cash limit. If limitType is PERCENT, this field is required.
          example: '25'
    UpdateTemporaryCreditLimit:
      title: TemporaryLimit
      required:
        - setLimit
      type: object
      properties:
        setLimit:
          type: boolean
          description:
            Provide "true" in the setLimit to set a temporary credit limit;
            the amount and endDate are required.  If a temporary credit limit already
            exists (setLimit already set to "true"), the user can provide an update
            to the amount and endDate. Provide "false" if do not want to set temporary
            credit limit. If "false", then amount and endDate is not needed.An error
            should be thrown if amount or endDate is attempted to update while "false".
          example: true
        amount:
          maximum: 10000000000000000
          type: string
          description:
            Temporary amount, provide in whole monetary units. Required
            if the setLimit is set to 'true'.
          example: '3500'
        endDate:
          maxLength: 10
          type: string
          description:
            Date temporary limit expires. Must be in UTC format, Must be
            equal to or greater than today's processing date; maximum date is 2049-12-30.  Required
            if temporary 'amount' is updated.
          format: date
    AccountLimitSearchRequest:
      required:
        - accountNumber
      type: object
      properties:
        accountNumber:
          type: string
          description: Account number of the cardholder.
          example: '12345678'
    AccountLimitSearchResponse:
      type: object
      properties:
        currentBalanceAmount:
          type: string
          description: Current balance on the account.
          example: '3000.00'
        creditLimitAmount:
          type: string
          description: Permanent credit limit for the account.
          example: '3000.00'
        availableCreditAmount:
          type: string
          description: Credit available for the account.
          example: '3000.00'
        cashLimitAmount:
          type: string
          description:
            Amount of the credit limit the account holder or cardholder
            can withdraw.
          example: '3000.00'
        availableCashAmount:
          type: string
          description: Cash available for the account.
          example: '3000.00'
        creditLineMaximumAmount:
          type: string
          description:
            Maximum credit limit allowed for accounts in whole monetary
            units.
          example: '3000.00'
        temporaryCreditLine:
          type: boolean
          description:
            Indicates if credit limit is temporary or not.Possible values
            - true or false.
          example: true
        previousCreditLimitAmount:
          type: string
          description: Previous temporary credit set up.
          example: '2000.00'
        temporaryCreditLimitAmount:
          type: string
          description: Temporary line of credit for the account.
          example: '200.00'
        temporaryCreditLineEndDate:
          type: string
          description:
            Date on which the temporary line of credit expires. This date
            must be equal to or greater than today's processing date.
          format: date
        billingCycle:
          type: string
          description: Billing cycle for the account.Possible values - 1-28
          example: '10'
        billingLevel:
          type: string
          description:
            Indicates whether billing occurs for the account at the company
            level (consolidated) or at the individual account level.Possible values
            - Blank/space,Consolidated and Individual. Billing level is not allowed
            for Consumer/Primary/Control Account.
          example: Individual
        lastpermanentCreditLimit:
          type: string
          description: Previous permanent credit limit assigned to the account.
          example: '1000.00'
        lastPermanentCreditLimitDate:
          type: string
          description:
            Date on which the previous credit limit was assigned to the
            Account.
          format: date
        highBalanceDate:
          type: string
          description: Date on which the account reached the highest balance.
          format: date
        highBalanceAmount:
          type: string
          description: Highest balance reached by the account.
          example: '2000.0'
    AssociatedCardsV2:
      title: Card
      type: object
      properties:
        customerName:
          type: string
          description: Name of the primary and secondary account owners.
        cardNumber:
          type: string
          description:
            16 digits for card number identifier. Card number printed on
            the card and this needs to be decrypted.
        association:
          type: string
          description: Type of association party. This applies only for Credit
          enum:
            - PRIMARY
            - SECONDARY
            - AUTHORIZED_USER
            - GUARANTOR_OR_CO-SIGNER
        expiredDate:
          type: string
          description: Date the card can no longer be used.
          format: MM/YYYY
          example: '2023-10-29'
        activationNeeded:
          type: string
          description:
            Indicates whether card activation needs to occur for the most
            recently issued card.
          enum:
            - 'Yes'
            - 'No'
        cardNetwork:
          type: string
          description: Network associated to Card (Master/VISA)
          enum:
            - VISA
            - MASTERCARD
        cardStatus:
          type: string
          description:
            Debit - Active, Capture, Deactive, Issued and Restricted. Credit
            - Blocked for Authorization, Not Active, Lost or Stolen, Fraud Detected,
            Normal.
          enum:
            - ACTIVE
            - CAPTURE
            - DEACTIVATE
            - ISSUED
            - RESTRICTED
            - BLOCKED_FROM_AUTHORIZATION
            - NOT_ACTIVE
            - LOST_OR_STOLEN
            - FRAUD_DETECTED
            - NORMAL
        statusReasonCode:
          type: string
          description: Indicates the reason code asscoaited to the card status.
          enum:
            - Lost block by Enfact
            - Fraud
            - Closed by Customer
            - Revoked
            - Closed by FI
            - Temp block by FI
            - Applied by IDV
            - Temp block by Enfact
            - Temp block by Agent
            - Deceased
            - Normal
            - None
            - Closed
            - Damaged
            - Customer Request
            - Lost
            - Stolen
            - Abused
        cardType:
          type: string
          description: Card Type, possible values Debit Credit_gateway or Credit
          enum:
            - CREDIT
            - DEBIT
            - CREDIT_GATEWAY
        cardClass:
          type: string
          description:
            Unique 5character alphanumeric identifier that represents a
            client-defined group of cardholders with common characteristics, such
            as card stock, withdrawal limits or processing days
        contactless:
          type: string
          description: The image of the contactless to be shown here,wifi image
        openFraudcase:
          type: string
          description:
            UI will display a circle in the lower right corner of the card
            if there is an open fraud case associated with the card
        personalizedEmbossingText:
          type: string
          description:
            Cardholder particular information, such as name, is printed
            in the form of a customised text message.
    Warning:
      type: object
      properties:
        message:
          type: string
          description: An explanation specific to this occurrence of the problem.
          example: Partial response
        warningDetails:
          type: array
          description:
            List of multiple errors that may cause/trigger the general
            error.
          items:
            $ref: '#/components/schemas/WarningDetail'
    WarningDetail:
      type: object
      properties:
        code:
          type: string
          description: Unique code for error.
          example: 206-45-7001
        detail:
          type: string
          description: Details of the error.
          example: Transaction results are >=1000. Please refine your search criteria.
  parameters:
    userIdParam:
      name: x-fapi-userId
      in: header
      description:
        User on behalf of whom the request is being made. userId must be
        alphanumeric.
      required: false
      style: simple
      explode: false
      schema:
        type: string
      example: JOHNDOE
    clientIdParam:
      name: x-fapi-financial-id
      in: header
      description:
        The 8-digit unique financial institute id assigned to each FI by
        Fiserv.
      required: true
      style: simple
      explode: false
      schema:
        type: string
      example: 0012345678
    docIdParam:
      name: docId
      in: path
      description: The documentId for any given statement.
      required: true
      style: simple
      explode: false
      schema:
        maxLength: 85
        minLength: 1
        pattern: ^[A-F0-9]+$
        type: string
        example: E68A974727A06929B786939B8C68B030CA4E56A3079985834543673C575B740FBE67229617FB
