          description: 'Represents current internal status of account.

            - NEVER_ACTIVE - Never active

            - PREVIOUSLY_ACTIVE - Account has been active but is not currently active

            - ACTIVE - Currently active account

            - DELINQUENT_ACCOUNT - Currently delinquent account or an account delinquent
            in its last three cycles

            '
          example: NEVER_ACTIVE
          enum:
            - NEVER_ACTIVE
            - PREVIOUSLY_ACTIVE
            - ACTIVE
            - DELINQUENT_ACCOUNT
