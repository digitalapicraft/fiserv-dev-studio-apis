            Codes  Description <br /> 100   Fraud <br /> 101   Deposit not posted <br /> 102   Deposit posted for incorrect amount <br /> 103   No cash received <br /> 104   Insufficient cash received <br /> 105   Charged more than once <br /> 106   Good faith <br /> 107   Copy request <br /> 108   Paid by other means <br /> 109   Service not received <br /> 110   Service cancelled <br /> 111   Service not as described <br /> 112   Merchandise not as described <br /> 113   Counterfeit card not present <br /> 114   Lost <br /> 115   Stolen <br /> 116   Counterfeit card present <br /> 117   Card not received as issued <br /> 118   Fraudulent application <br /> 119   Account takeover <br /> 120   Counterfeit card <br /> 121   No authorization <br /> 122   Declined authorization <br /> 123   Late presentment greater than 180 days <br /> 124   Late presentment credit problem <br /> 125   Late presentment account closed fraud <br /> 126   Late presentment account closed not fraud <br /> 137   Charged incorrect amount <br /> 139   Merchandise not received <br /> 140   Merchandise cancelled <br /> 141   Adjustment <br /> 142   Deposit keying error <br /> 143   Deposit missing or empty envelope <br /> 144   Deposited item returned - NSF <br /> 145   Deposited item returned - Stop payment <br /> 146   Deposited item returned - Account closed <br /> 147   Deposited item returned - No account <br /> 148   Other <br />
