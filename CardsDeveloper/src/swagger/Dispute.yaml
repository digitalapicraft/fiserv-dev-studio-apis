          description: "'DS' for Dispute </br> 'FR' for Fraud </br> 'FO' for Fraud Only </br> 'ID' for Issuer Dispute."
          example: DS
        typeDesc:
          type: string
          description: Description of the case type.
          example: Dispute
        status:
          type: string
          description: Pending </br> Open </br> Closed </br> or Queued </br>
          example: Closed
        createdDateTime:
          type: string
          description: Case opened/created date in GMT format.
          example: 2021-07-20T07:00:00.000+0000
        closedDateTime:
          type: string
          description: Case closed date in GMT format.
          example: 2021-07-20T07:00:00.000+0000
        claimAmount:
          type: string
          description: Amount claimed
          example: '200.50'
        claimCurrency:
          type: string
          description: Currency type of claim
          example: US Dollar (USD)
        reasonCode:
          type: string
          description: Internal reason Code for the Dispute <br /> - 100 <br /> - 101 <br /> - 102 <br /> - 103 <br /> - 104 <br /> - 105 <br /> - 106 <br /> - 107 <br /> - 108 <br /> - 109 <br /> - 110 <br /> - 111 <br /> - 112 <br /> - 113 <br /> - 114 <br /> - 115 <br /> - 116 <br /> - 117 <br /> - 118 <br /> - 119 <br /> - 120 <br /> - 121 <br /> - 122 <br /> - 123 <br /> - 124 <br /> - 125 <br /> - 126 <br /> - 137 <br /> - 139 <br /> - 140 <br /> - 141 <br /> - 142 <br /> - 143 <br /> - 144 <br /> - 145 <br /> - 146 <br /> - 147 <br /> - 148 <br />
          example: '112'
        reasonCodeDescription:
          type: string
          description: The description of the reason code. <br /> Codes  Description <br /> 100   Fraud <br /> 101   Deposit not posted <br /> 102   Deposit posted for incorrect amount <br /> 103   No cash received <br /> 104   Insufficient cash received <br /> 105   Charged more than once <br /> 106   Good faith <br /> 107   Copy request <br /> 108   Paid by other means <br /> 109   Service not received <br /> 110   Service cancelled <br /> 111   Service not as described <br /> 112   Merchandise not as described <br /> 113   Counterfeit card not present <br /> 114   Lost <br /> 115   Stolen <br /> 116   Counterfeit card present <br /> 117   Card not received as issued <br /> 118   Fraudulent application <br /> 119   Account takeover <br /> 120   Counterfeit card <br /> 121   No authorization <br /> 122   Declined authorization <br /> 123   Late presentment greater than 180 days <br /> 124   Late presentment credit problem <br /> 125   Late presentment account closed fraud <br /> 126   Late presentment account closed not fraud <br /> 137   Charged incorrect amount <br /> 139   Merchandise not received <br /> 140   Merchandise cancelled <br /> 141   Adjustment <br /> 142   Deposit keying error <br /> 143   Deposit missing or empty envelope <br /> 144   Deposited item returned - NSF <br /> 145   Deposited item returned - Stop payment <br /> 146   Deposited item returned - Account closed <br /> 147   Deposited item returned - No account <br /> 148   Other <br />
          example: Merchandise not as described
        currentStep:
          type: integer
          description: Value of current step
          format: int32
          example: 999
        issuerFiId:
          type: string
          description: Issuer Financial Institution identifier
          example: '12345678'
        acquirerFiId:
          type: string
          description: Acquirer Financial Institution identifier
          example: '87654321'
        acquirerRefNum:
          type: string
          description: Acquirer reference number which is assigned by the network based on information provided by the acquirer.
          example: '14515501298011980119806'
        sequence:
          type: string
          description: 6-digit transaction sequence
          example: '121980'
        transactionDate:
          type: string
          description: Transaction Date
          example: 1990-08-24T00:00:00.000+0000
        transactionAmount:
          type: string
          description: Original transaction Amount
          example: '200.50'
        transactionCurrency:
          type: string
          description: Currency type of transaction amount
          example: US Dollar (USD)
        network:
          type: string
          description: Network Name, indicate Visa(VISA),  Mastercard (MC) etc
