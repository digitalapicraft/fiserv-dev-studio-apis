        authorizationCode:
          type: string
          description: Authorization Code
          example: '628934'
        terminalId:
          type: string
          description: Terminal ID
          example: VMDIEOS1
        terminalName:
          type: string
          description: Terminal (Merchant) Name
          example: Home Supply
