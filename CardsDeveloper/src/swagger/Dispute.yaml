            $ref: '#/components/schemas/Questionnaire'
    Questionnaire:
      required:
        - questionName
        - questionValue
      type: object
      properties:
        questionName:
          type: string
          description: |-
            The unique question name corresponding to the question from the query questionnaire documentation. List of QuestionsNames and their description and values are as below <br />
            - QuestVar_CaseItem.Unauth_Participation <br /> (Did you participate in the transaction?) <br /> Answer </b>-  Yes/No <br />
            - QuestVar_CaseItem.SelectATMWDL_DSReason <br /> (Select reason for dispute) <br /> Answer-  A/B <br /> A. Charged more than once. <br /> B. Received incorrect amount of cash <br />
            - QuestVar_CaseItem.SelectATMDSReason <br /> (Select reason for dispute) <br /> Answer-  A/B <br /> A. ATM deposit did not post to account (manually entered transaction) <br /> B. Incorrect credit received for ATM deposit <br />
            - QuestVar_CaseItem.Cash_or_Checks_Returned <br /> (Were any checks or cash returned to you?) <br /> Answer-  Yes/No <br />
            - QuestVar_CaseItem.AmountReturned <br /> (What was the total dollar amount of items returned to you?) <br /> Answer-  String (1.00) <br />
            - QuestVar_CaseItem.TotalAmountofDispute <br /> (What is the dollar amount of your dispute?) <br /> Answer- String (1.00) <br />
            - QuestVar_CaseItem.AdditionalInformation  <br /> (Is there any additional information you would like to provide?) <br /> Answer- Yes/Nop <br />
            - QuestVar_CaseItem.GeneralComments <br /> (Enter additional information) <br /> Answer- String (MinLength-1, MaxLength-2147483647) <br />
            - QuestVar_CaseItem.OralNotification <br /> (Change date of Oral Notification?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.OralNotificationDate <br /> (Oral Notification Date) <br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.CardLostStolen <br />  (Is your card lost or stolen?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.LostOrStolen <br /> (Choose one (lost or stolen)) <br /> Answer- A/B <br /> A. Lost <br /> B. Stolen <br />
            - QuestVar_CaseItem.WhoUsedCard <br /> (Do you know who may have used your card for this transaction?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.Unauth_AuthorizedUsers <br /> (Record Name) <br /> Answer- String ( Record name of the person)(MinLength-1, MaxLength-2147483647) <br />
            - QuestVar_CaseItem.CardUsePermission <br /> (Did you give that person permission to use your card?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.PINConsent <br /> (Did you give that person your PIN?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.MultipleWDL_Chrgs <br /> (How many times was your account charged for the same withdrawal?) <br /> Answer- String (1.00) <br />
            - QuestVar_CaseItem.ATM_ReceiveAmount <br /> (Amount of cash received (indicate 0.00 if no cash was received)) <br /> Answer- String (1.00) <br />
            - QuestVar_CaseItem.DisputeCategory <br /> (Why are you disputing this transaction?) <br /> Answer- A/B/C/D <br /> A. Cancellation of merchandise or service (Free Trial) <br /> B. Merchandise or service not received <br /> C. Dissatisfied with merchandise or service <br /> D. Charged incorrectly, satisfied with and received merchandise or service <br />
            - QuestVar_CaseItem.ID_DisputePortion <br /> (How much of the transaction amount are you disputing?) Answer- A/B <br /> A. Full Amount <br /> B. Partial Amount <br />
            - QuestVar_CaseItem.ID_PartialDSAmount <br /> (Enter partial amount) <br /> Answer- String (1.00) <br />
            - QuestVar_CaseItem.Merchnds_Or_Service <br /> (Is this merchandise or a service) <br /> Answer- A/B <br /> A. Merchandise <br /> B. Service <br />
            - QuestVar_CaseItem.Auth_CancelReason <br /> (Why did you cancel the merchandise) <br /> Answer- String ( reason for Cancellation)(MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.Auth_CancelDate <br /> (On what date did you cancel the merchandise?  Prompt for a guess.) <br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.MerchandiseRec <br /> (Did you receive the merchandise?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.CancelledPriorToShip <br /> (Did you cancel the merchandise prior to the ship d)ate?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.Return_Attempt <br /> (Why didn’t you return the merchandise?) <br /> Answer- A/B/C <br /> A.Merchant would not accept a return B.Merchant refused to provide a return authorization C.Merchant informed the cardholder not to return the merchandise
            - QuestVar_CaseItem.Auth_CancelReason <br /> (Why did you cancel the service?) <br /> Answer- String (Reason of return of service)(MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.Auth_CancelDate <br /> (On what date did you cancel the service? Prompt for a guess.) <br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.ServiceReceived <br /> (Did you receive the service?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.PartialDSAmount <br /> (Enter dispute amount) <br /> Answer- String (1.00) <br />
            - QuestVar_CaseItem.PartialDSReason <br /> (Why are you not disputing the full amount?) <br /> Answer- String ( reason of not disputing full amount)(MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.MerchContactAttemptMer <br /> (Did you attempt to contact the merchant to resolve the issue?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.CaptureMerchResp <br /> (Capture merchant response and method of communication)(MinLength-1, MaxLength-300) <br /> Answer- String <br />
            - QuestVar_CaseItem.MerchantAttemptResolveDate <br /> (Date of the attempt to resolve) <br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.SelectDisputeDetails <br /> (Were you charged more than once?) <br /> Answer- A/B <br /> A. Yes, the cardholder was charged more than once <br /> B. No, the cardholder was charged an incorrect amount <br />
            - QuestVar_CaseItem.ChargesOnSameCard <br /> (Are all of the charges on this card?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.HotelRentalCarChrg <br /> (Is this charge related to a hotel or car rental?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.FinalBill <br /> (Was this charge included on your final bill?) <)br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.ChargeDescription <br /> (Do you know what the charge is for?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.Auth_MerchantDesc <br /> (Capture response) <br /> Answer- String(MinLength-1, MaxLength-2147483647) <br />
            - QuestVar_CaseItem.DateValidCharge <br /> (What is the date of the first charge) <br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.AmountofValidCharge <br /> (What is the amount of the first charge?) <br /> Answer- String (1.00) <br />
            - QuestVar_CaseItem.PaymentMethods <br /> (What was the other payment method?) <br /> Answer- A/B/C/D <br /> A. Check <br /> B. Other card payment <br /> C. Cash <br /> D. Other <br />
            - QuestVar_CaseItem.CheckCopy <br /> (Do you have a copy of the check used or the bank statement for the checking account?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.StatementReeipt <br /> (Do you have the receipt or bank statement for the other card used?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.CashReceipt <br /> (Do you have the receipt for the cash payment?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.PaymentMethodDescription <br /> (Describe) <br /> Answer- String(MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.OtherProof <br /> (Do you have any documentation of this payment method?) <br /> Answer- Yes/No <br />
            - Questvar_CaseItem.DisputeReason <br /> (Why are you dissatisfied with the merchandise? (Ask for specifics- color, brand, size, how the item is damaged, how it is defective, etc.)) <br /> Answer- String (MinLength-1, MaxLength-2147483647) <br />
            - QuestVar_CaseItem.DigitalWallet_Y_or_N <br /> (Is the merchandise digital? (Software, iTunes or Google play apps, music, movies, etc.)) <br /> Answer- True/False <br />
            - QuestVar_CaseItem.MerchandiseReturned <br /> (Did you return the merchandise?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.Return_Methods <br /> (How was the merchandise returned?) <br /> Answer- A or B or C or D or E <br /> A. In person <br /> B. FeEx <br /> C. USPS <br /> D. UPS <br /> E. Other <br />
            - QuestVar_CaseItem.Return_MethodDescription <br />  (Describe) <br /> Answer- String (MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.Auth_MerchandiseDateReturned <br /> (On what date was the merchandise returned? Prompt for a guess). <br /> Answer- Date (MM/DD/YYYY) <br />
            - Questvar_CaseItem.DisputeReasonService <br /> (Why are you dissatisfied with the service? (Please be as detailed as possible.)) <br /> Answer- String (MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.RecurringCharge <br />  (Is this a recurring charge?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.ServiceCancelled <br /> (Did you attempt to cancel the service?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.Auth_CancelDate <br />  (On what date did you cancel the service? Prompt for a guess).<br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.ExpectedMerchRecDate <br /> (On what date did you expect to receive the merchandise? Prompt for a guess.)<br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.Auth_DeliverDate <br /> (On what date did you expect to receive the service? Prompt for a guess.) <br /> Answer- Date (MM/DD/YYYY) <br />
            - QuestVar_CaseItem.Merch_Disposition <br /> (What is the disposition of merchandise?) <br /> Answer- String (MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.Merch_IncorrectLocation_Y_or_N <br /> (Was the merchandise delivered to an incorrect location?) <br /> Answer- True/False <br />
            - QuestVar_CaseItem.Merch_IncorrectLocation <br /> (Provide address of the agreed location.) <br /> Answer- String (MinLength-1, MaxLength-300) <br />
            - QuestVar_CaseItem.Merch_DeliveredLateDetails_Y_or_N <br /> (Was the merchandise delivered late?) <br /> Answer- True/False <br />
            - QuestVar_CaseItem.Merch_DeliveredLateDetails <br /> (Provide details of the late delivery.) c
            - QuestVar_CaseItem.MerchandiseReturned <br /> (Did you return the merchandise?) <br /> Answer- Yes/No <br />
            - QuestVar_CaseItem.DigitalWallet_Y_or_N  <br /> (Are the services related to the funding of a digital wallet?) <br /> Answer- True/False <br />
            - QuestVar_CaseItem.WalletAddress_Y_or_N <br /> (Was non-fiat currency or non-fungible token(s) not successfully delivered to the destination wallet address supplied by the cardholder at the time of the Transaction?) <br /> Answer- True/False <br />
            - QuestVar_CaseItem.Bankruptcy_Y_Or_N <br /> (Is merchant in bankruptcy/liquidation?) <br /> Answer- True/False <br />
            - QuestVar_CaseItem.ID_DisputeReason <br /> (What is the reason for the issuer dispute?) <br /> Answer- A or B or C <br /> A. No Authorization <br /> B. Declined Authorization <br /> C. Late Representment <br />
            - QuestVar_CaseItem.ID_LatePresentment <br /> (What is the reason for the late present dispute?) <br /> Answer- A or B <br /> A. Transaction date more than 180 days earlier than the processing date <br /> B. Unable to post transaction to cardholder account <br />
            - QuestVar_CaseItem.ID_UnablePostTran <br /> (What is the reason why you are unable to post the transaction to the cardholder account? ) <br /> Answer- A or B or C <br /> A.  Credit problem ( NSF) <br /> B. Account closed due to fraud <br /> C. Account closed for any reason other than Fraud <br />
            - QuestVar_CaseItem.FO_DisputeReason <br /> (Choose fraud reason) <br /> Answer- 113 or 114 or 115 or 116 or 117 or 118 or 119 <br /> 113. Counterfeit Card not present <br /> 114. Lost <br /> 115. Stolen <br /> 116. Counterfeit Card present <br /> 117. Card not received as issued <br /> 118. Fraudulent Application <br /> 119. Account Takeover <br />
          example: QuestVar_CaseItem.Unauth_Participation
        questionValue:
          type: string
          description: The value provided as the answer to the question.
          example: 'Yes'
    QuestionResponse:
      type: object
      properties:
        caseItemId:
          pattern: '[0-9]{1,12}'
          type: string
          description: Case item ID associated with a case ID.
          example: '999999999'
        referenceId:
          type: string
          description: A means to uniquely identify this request.
          example: serv.net:___212344MBVKXK4K:0103b250-a424-4cd7-bfaa-807f0ff79d23
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionnaireAnswer'
    QuestionnaireAnswer:
      type: object
      properties:
        questionName:
          type: string
          description: The unique question name corresponding to the question from the query questionnaire documentation.
          example: QuestVar_CaseItem.Unauth_Participation
        questionValue:
          type: string
          description: The value provided as the answer to the question.
          example: 'Yes'
        questionDescription:
          type: string
          description: Description of the question.
          example: Did you participate in the transaction?
    ClaimCreateV3Request:
      required:
        - cardNumber
        - caseType
        - listOfTransactions
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: 16-19 digit Card Number.
          example: '4000200030004000'
        caseType:
          type: string
          description: Case type of the dispute. DS- Dispute, FO- Fraud Only, ID- Issuer Dispute.
          example: DS
          enum:
            - DS
            - FO
            - ID
        listOfTransactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionDetailsV2'
    ClaimCreateV3Response:
      type: object
      properties:
        caseId:
          maxLength: 12
          type: string
          description: Dispute Case Id.
          example: '999999999'
        referenceId:
          type: string
          description: A means to uniquely identify this request.
          example: serv.net:___212344MBVKXK4K:0103b250-a424-4cd7-bfaa-807f0ff79d23
        caseItemIds:
          type: array
          items:
            type: string
            description: Case item ID associated with a case ID.
            example: transactionID[{"lifeCycleKey":"12323301232312331","activeKey":"0210","duID":"11348539120200526"}]:caseItemId[999999999]
    PartialClaimCreateV3Response:
      type: object
      properties:
        caseId:
          maxLength: 12
