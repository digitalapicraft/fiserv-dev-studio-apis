        referenceId:
          type: string
          description: A means to uniquely identify this request.
          example: serv.net:___212344MBVKXK4K:0103b250-a424-4cd7-bfaa-807f0ff79d23
        caseItemIds:
          type: array
          items:
            type: string
            description: TransactionID and Case item ID associated with the case ID.
            example: transactionID[{"lifeCycleKey":"12323301232312331","activeKey":"0210","duID":"11348539120200526"}]:caseItemId[999999999]
        warningInfo:
          $ref: '#/components/schemas/Warning'
    TransactionDetailsV2:
      required:
        - transactionId
      type: object
      properties:
        transactionId:
          type: string
          description: Unique system id for the record. It is made from lifecycle key, active key, and duID. Applies to debit cards only.
          example: '{"lifeCycleKey":"12323301232312331","activeKey":"0210","duID":"11348539120200526"}'
    Adjustments:
      type: object
      properties:
        id:
          type: string
          description: Internal identifier of the adjustment.
          example: '55748'
        type:
