          description: Configurable value but list of values commonly includes </br>'AD' for adjustment </br> 'CB' for chargeback </br> 'RP' for representment </br> 'AR' for arbitration </br> 'GF' for good faith </br> 'CP' for compliance
          example: CB
        typeDesc:
          type: string
          description: Description for adjustment type.
          example: chargeback
        intExtType:
          type: string
          description: "'I' for internal financial, 'E' for network request, 'A' for network attached"
          example: I
        amount:
          type: string
          description: Amount of adjustment
          example: '20.00'
        comment:
          type: string
          description: User comment
          example: Credit Cardholder-Disputed Transaction
        status:
          type: string
          description: String describing status of the adjustment
          example: Done
        debitCreditIndicator:
          type: string
          description: "'D' for Debit or 'C' for Credit"
          example: C
    CancelCaseItemResponse:
      type: object
      properties:
        warningInfo:
          $ref: '#/components/schemas/Warning'
    Cases:
      type: object
      properties:
        caseId:
          maxLength: 12
          type: string
          description: Dispute Case ID
          example: '999999999'
        role:
          type: string
          description: "'A' for Acquirer, 'I' for Issuer or 'H' for In-house. "
          example: I
        roleDesc:
          type: string
          description: A description for the role.
          example: Issuer
        caseItems:
          type: array
          items:
            $ref: '#/components/schemas/CaseItems'
    CaseItems:
      type: object
      properties:
        caseItemId:
          maxLength: 12
          type: string
