      required:
        - paymentType
      type: object
      properties:
        paymentAmount:
          maxLength: 14
          minLength: 0
          type: string
          description: This field contains the total amount to be paid or authorized in the transaction. It is applicable for scheduled payment operations and must match the posted amount  to ensure successful payment processing..
          example: '12.00'
        paymentDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains the date when the payment was applied to the cardholder’s account. It is applicable for scheduled payment operations and must be provided in YYYY-MM-DD format to ensure successful processing.
          format: date
          example: 2025-11-25
        paymentType:
          type: string
          description: This field contains the type of payment to be processed. It is applicable for scheduled payment operations and must be provided as one of the following valid values to ensure successful processing.
          example: ONETIME_ACH
          enum:
            - ONETIME_ACH
            - RECURRING_ACH
        recurringStartDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains the start date for recurring ACH payments. It is applicable for scheduled payment operations and must be provided in YYYY-MM-DD format to initiate recurring payment processing successfully.
          format: date
          example: 2025-11-25
        registrationId:
          maxLength: 10
          type: string
          description: This field contains the unique identifier for a registered funding account. It is applicable for scheduled payment operations and must be provided to link the payment method to the account for successful processing.
          example: '2697068'
        recurringEndDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains the end date for recurring ACH payments. It is applicable for scheduled payment operations and must be provided in YYYY-MM-DD format to define when recurring payment processing should stop.
          format: date
          example: 2025-12-31
        recurringCalendarDay:
          type: string
          description: 'Recurring ACH payment day of the month. Contains a 7-character string that defines which days of the week for payments to occur. The first character in the string represents the first day of the week, Sunday. For example, the string “0100000” indicates that payments occurs on Mondays. The string “0111110” indicates payments occur on Monday, Tuesday, Wednesday, Thursday, and Friday.'
          example: '0101000'
        taxAmount:
          maxLength: 12
          minLength: 0
          type: string
          description: 'This field contains the tax amount included in the payment, if applicable. It is applicable for scheduled payment operations and must be provided as a numeric value representing the tax amount.'
          example: '0.00'
        recurrenceDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains the date setting for when the recurring ACH payment is scheduled to occur. It is applicable for scheduled payment operations and must be provided using one of the following valid values ON_TIME_PAYMENT_DUE – Payment occurs on the due date SPECIFIC_DAY_MONTH Payment occurs on a specific day of the month.
          example: ON_TIME_PAYMENT_DUE
          enum:
            - ON_TIME_PAYMENT_DUE
            - SPECIFIC_DAY_MONTH
