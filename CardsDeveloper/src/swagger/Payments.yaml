    PaymentHold:
      type: object
      properties:
        paymentEventIdentifier:
          maxLength: 12
          type: string
          description: This field contains Unique identifier for the payment event. Used for tracking and reconciliation of card payments.
          example: '99999667'
        transactionCode:
          type: integer
          description: 'This field contains Code representing the type of payment transaction. Valid values are 251,252,271,272 and 273.'
          example: 251
        description:
          type: string
          description: This field contains Narrative describing the payment action or adjustment on the account. Applies to  card transactions.
          example: '251'
          enum:
            - Payment
            - Payment_Reversal
            - Payment_Adjustment
            - Payment_Authorization
        postingDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date when the payment transaction was posted to the account. Displayed in the format YYYY-MM-DD.
          format: date
          example: 2025-12-02
        effectiveDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date the payment is considered effective and posted to the account. Displayed in the format YYYY-MM-DD.
          format: date
          example: 2025-12-02
        paymentAmount:
          maxLength: 14
          minLength: 0
          type: string
          description: This field contains Total amount to be paid or authorized in the transaction. Must match the posted amount for right time payments.
          example: '4000.00'
        ageOffDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date after which the payment record is archived and no longer searchable. Displayed in the format YYYY-MM-DD.
          format: date
          example: 2025-12-28
        floatAmount:
          type: integer
          description: This field contains Amount held in float before final posting. Must not exceed the payment amount. Applies to  card payments.
          example: 2501
        floatExpirationDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Expiration date for the float status of the payment. Displayed in the format YYYY-MM-DD.
          format: date
          example: 2025-12-28
        currentStatusText:
          type: string
          description: 'This field contains Status text indicating the current state of the payment transaction. Valid Values: • CH–Payment float amount and/or date changed • CL–Payment float cleared • EX–Payment float amount cleared due to exclusion • IN–Payment has been decisioned • MC–Payment has been matched • NS–Payment float amount at 100% • RV–Reversal or adjustment of payment • TR–Transferred due to an account.'
          example: TR–Transferred due to an account
          enum:
            - CH - Payment float amount and/or date changed
            - CL - Payment float cleared
            - EX - Payment float amount cleared due to exclusion
            - IN - Payment has been decisioned
            - MC - Payment has been matched
            - NS - Payment float amount at 100%
            - RV - Reversal or adjustment of payment
            - TR - Transferred due to an account
        availableCreditAmount:
          maxLength: 12
          type: string
          description: Available credit amount for this account.
          example: '1000.00'
        exclusionDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date when the account is excluded from float processing. Displayed in the format YYYY-MM-DD.
          format: date
          example: 2025-12-28
    PaymentHoldReleaseRequest:
