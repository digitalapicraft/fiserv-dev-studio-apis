    PaymentHoldUpdateRequest:
      required:
        - floatAmount
        - floatExpDate
      type: object
      properties:
        floatAmount:
          maxLength: 14
          minLength: 0
          type: string
          description: ' This field contains Amount held in float before final posting. Must not exceed the payment amount. Applies to  card payments. It is applicable for payment operations and must be provided to ensure successful processing.'
          example: '2501'
        floatExpDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Updated expiration date for the float process. Must not exceed age off date. It is applicable for payment operations and  and must be provided in YYYY-MM-DD format to ensure successful processing.
          format: date
          example: 2025-12-28
      description: floatAmount and floatExpDate are mandatory to call the update.
    PaymentHoldRequest:
      required:
        - accountNumber
        - paymentEventIdentifier
      type: object
      properties:
        paymentEventIdentifier:
          maxLength: 12
          type: string
          description: This field contains Unique identifier for the payment event. Used for tracking and reconciliation of card payments. It is applicable for payment operations and must be provided to ensure successful processing.
          example: '065060013894'
        accountNumber:
          maxLength: 19
          minLength: 13
          type: string
          description: This field contains Unique identifier for the cardholder's account in the system of record. Applicable for both  card accounts.. It is applicable for payment operations and must be provided to ensure successful processing
          example: '5420000010012345'
        update:
          $ref: '#/components/schemas/PaymentHoldUpdateRequest'
        release:
          $ref: '#/components/schemas/PaymentHoldReleaseRequest'
