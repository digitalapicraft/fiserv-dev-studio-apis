          type: array
          items:
            $ref: '#/components/schemas/Payment'
    Payment:
      title: Payment
      type: object
      properties:
        paymentDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date when the payment was applied to the cardholder's account.
          format: date
          example: 2025-12-02
        paymentAmount:
          maxLength: 14
          minLength: 0
          type: string
          description: This field contains Total amount to be paid or authorized in the transaction. Must match the posted amount for right time payments.
          example: '1000.00'
        dueDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date by which the payment is due for the account.
          format: date
          example: 2025-12-17
        effectiveDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date the payment is considered effective and posted to the account. Applies to all card types.
          format: date
          example: 2025-12-02
        cycleDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Billing cycle date for the account.
          format: date
          example: 2025-11-20
        paymentDueAmount:
          maxLength: 14
          type: string
          description: This field contains Minimum amount required to be paid by the due date. Applicable for  card accounts.
          example: '30.00'
        reversalCode:
          type: string
          description: "This field contains Indicator showing if the payment was reversed. If the code returned is transaction code = 272, show 'Reversed' else 'Not Reversed'."
          example: Reversed
          enum:
            - Reversed
            - Not Reversed
        description:
          type: string
          description: This field contains Narrative describing the payment action or adjustment on the account.
          example: Payments
          enum:
            - Payments
            - Payment Reversal
            - Adjustments
            - Unknown
        daysDelinquent:
          type: string
          description: This field contains Number of days the account has been past due.
          example: '5'
        delinquentAmount:
          type: string
          description: This field contains Total overdue amount on the account.
          example: '100.00'
        fixPaymentAmount:
          type: string
          description: This field contains Fixed amount set for recurring payments.
          example: '100.00'
        paymentTicketIdentifier:
          type: string
          description: This field contains Unique identifier assigned to the payment ticket.
          example: '124501620575344'
        postDate:
          maxLength: 10
          minLength: 10
          type: string
          description: This field contains Date when the payment was officially posted to the account
          format: date
          example: 2025-12-02
        transactionAmount:
          maxLength: 14
          type: string
          description: This field contains Dollar-and-cent Amount of the transaction posted to the account.
          example: '1990.00'
        transactionCode:
          type: string
          description: This field contains Code representing the type of payment transaction.
          example: '271'
        interestFeesDistribution:
          type: array
          items:
            $ref: '#/components/schemas/InterestFeesDistribution'
    InterestFeesDistribution:
      title: InterestFeesDistribution
      type: object
      properties:
