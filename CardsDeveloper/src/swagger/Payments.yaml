          description: This field contains the unique identifier for the cardholder’s account in the system of record. It is applicable for scheduled payment operations and must match the account information stored in the system of record to ensure successful processing
          example: '5420000010012345'
        registrationId:
          maxLength: 7
          type: string
          description: This field contains the unique identifier for a registered funding account. It is applicable for scheduled payment operations and must be provided to link the payment method to the cardholder’s account for successful processing.
          example: '2697068'
        makePayment:
          $ref: '#/components/schemas/MakePayment'
        updatePayment:
          $ref: '#/components/schemas/UpdatePayment'
        cancelPayment:
          $ref: '#/components/schemas/CancelPayment'
