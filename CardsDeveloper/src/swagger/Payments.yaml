          example: 2025-12-02
        cardNumber:
          type: string
          description: This field contains Decrypted card number used for the transaction or reversal.. It is applicable for payment operations and must be provided to ensure successful processing.
          example: '4010002000300000'
    ReverseRightTimePayment:
      required:
        - cardNumber
        - merchantNumber
        - paymentAmount
      type: object
      properties:
        merchantNumber:
          maxLength: 16
          minLength: 1
          type: string
          description: This field contains merchant number associated with the right time payment transaction. It is applicable for payment operations and must be provided to ensure successful processing. The merchant number is decrypted so you can view the merchant number before the transaction occurs.
          example: '456009212349823'
        cardNumber:
          type: string
          description: This field contains Decrypted card number used for the transaction or reversal. It is applicable for payment operations and must be provided to ensure successful processing.
          example: '4010002000300000'
        paymentAmount:
          maxLength: 14
          minLength: 0
          type: string
          description: This field contains Total amount to be paid or authorized in the transaction. Must match the posted amount for right time payments. It is applicable for payment operations and must be provided to ensure successful processing.
          example: '10.99'
        paymentSourceCode:
          maxLength: 22
          minLength: 2
          type: string
          description: |
            This field contains Code indicating the origin of the right time payment transaction.
            - 00 - Unknown
            - 01 - Teller
            - 02 - ATM
            - 03 - Retailer
            - 04 - Online Banking
            - 05 - Mail
            - 06 - Western Union
          example: MAIL
          enum:
            - UNKNOWN
            - TELLER
            - ATM
            - RETAILER
            - ONLINE_BANKING
            - MAIL
            - WESTERN_UNION
        paymentTypeCode:
          maxLength: 25
          minLength: 2
          type: string
          description: |
            This field contains Code representing the payment medium used for right time payment.
            - 00 - Unknown
            - 01 - Check
            - 02 - Money order
            - 03 - Cash
            - 04 - Credit card
            - 05 - Debit card
            - 06 - Electronic funds transfer (EFT)
            - 07 - Wire transfer
            - 08 - Coupon
          example: CASH
          enum:
            - UNKNOWN
            - CHECK
            - MONEY_ORDER
            - CASH
            - CREDIT_CARD
            - DEBIT_CARD
            - EFT
            - WIRE_TRANSFER
            - COUPON
        transactionDate:
          maxLength: 10
          minLength: 10
