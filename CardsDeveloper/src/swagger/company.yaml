components:
  schemas:
    AddCompanyAddress:
      type: object
      properties:
        addressLine1:
          type: string
          description: Text containing the first line of the company mailing address
          example: 123 ANY STREET
        addressLine2:
          type: string
          description: Text containing the second line of the company mailing address
          example: APT 100
        addressLine3:
          type: string
          description: Text containing the third line of the company mailing address
          example: PARSIPPANY
        addressLine4:
          type: string
          description: Text containing the fourth line of the company mailing address
          example: NJ
        country:
          type: string
          description:
            ISO code representing the country of the company-related commercial
            card address. It is a three-position code for a First Data-supported country.
          example: USA
        state:
          type: string
          description: Name of the state.
          example: NJ
        zipCode:
          type: string
          description: Postal code or zipcode associated with the address.
          example: '07054'
        city:
          type: string
          description: City in which the company is located.
          example: PARSIPPANY
        addressBypassValidationCode:
          type: string
          description:
            Code determining whether the System bypasses the address during
            the automatic address correction phase of address validation. Max length
            can be 1 characters.
          example: B
        isFormattedAddress:
          type: boolean
          description:
            Indicates if address is an US address or international address.
            If set to true- Address Line 3 & 4 should be blank.
          example: true
    AddCompanyRequest:
      required:
        - address
        - agentIdentifier
        - balancePercentageOfUnitAverageRate
        - billingCycleCode
        - cardholderCreditLineExceptionPercentageRate
        - cardholderRecapSummaryReportFrequencyCode
        - companyContractExpirationDate
        - companyCreditLimit
        - companyCreditLineExceptionPercentageRate
        - companyIdentifier
        - companyName
        - employeeActivityReportFrequencyCode
        - fiscalYearEndCode
        - merchantSummaryAnalysisReportFrequencyCode
        - minorityVendorReportFrequencyCode
        - monthlyReportCode
        - nextReviewDate
        - principalIdentifier
        - systemIdentifier
      type: object
      properties:
        companyIdentifier:
          type: string
          description:
            Identifier of the company which can be alpanumeric. Maximum
            length can be 8 characters.
          example: TEST0002
        systemIdentifier:
          type: string
          description:
            First Data-assigned identifier which is used to group principal
            identifiers together for processing and reporting. Valid length is 4 digits.
          example: '3771'
        principalIdentifier:
          type: string
          description:
            Client-defined identifier within a system identifier that is
            used to group agent identifiers together for processing and reporting.
            Valid length is 4 digits.
          example: '0050'
        agentIdentifier:
          type: string
          description:
            Client-defined identifier within a principal identifier that
            is used to group accounts together for processing and reporting. Valid
            length is 4 digits.
          example: '0000'
        companyName:
          type: string
          description:
            Text describing the name of the company. Max length can be
            26 characters.
          example: TEST COMPANY
        fiscalYearEndCode:
          type: string
          description:
            Code representing the month that the fiscal year end occurs.
            Max length can be 2 characters.
          example: '03'
        companyContractExpirationDate:
          type: string
          description:
            Field representing the expiration of the company contract.
            Format MM/YY.
          example: 12/30
        nextReviewDate:
          type: string
          description: Date scheduled for its next review. Length 2, Format 99.
          example: '10'
        companyCreditLimit:
          type: string
          description:
            Amount of maximum credit extended to the commercial card account.
            Max length can be 15 characters.
          example: '100000'
        companyCreditLineExceptionPercentageRate:
          type: string
          description:
            Percentage of company credit line that the current balance
            must equal or exceed for reporting purposes. Max length can be 3 characters.
          example: '090'
        cardholderCreditLineExceptionPercentageRate:
          type: string
          description:
            Percentage of individual cardholder credit line that the current
            balance must equal or exceed for reporting purposes. Max length can be
            3 characters.
          example: '090'
        balancePercentageOfUnitAverageRate:
          type: string
          description:
            Percentage rate of unit average that a customers current balance
            must equal or exceed for reporting purposes. Max length can be 3 characters.
          example: '090'
        billingCycleCode:
          type: string
          description:
            Code determining which subaccounts for this company are verified
            in order to ensure that all subaccounts have the correct billing cycle
            code. Max length can be 2 characters.
          example: '12'
        minorityVendorReportFrequencyCode:
          type: string
          description:
            Code determining how often you want the System to generate
            the CA-012, Minority Vendor Report. Max length can be 1 characters.
          example: M
        merchantSummaryAnalysisReportFrequencyCode:
          type: string
          description:
            Code determining how often you want the System to generate
            the CC-807/CM-807, Merchant Summary Analysis Report. Max length can be
            1 characters.
          example: M
        monthlyReportCode:
          type: string
          description:
            Code determining how often you want the System to generate
            the monthly report. Max length can be 1 characters.
          example: C
        employeeActivityReportFrequencyCode:
          type: string
          description:
            Code determining how often you want the System to generate
            the CC-163/CM-163, Employee Activity Report. Max length can be 1 characters.
          example: M
        cardholderRecapSummaryReportFrequencyCode:
          type: string
          description:
            Code determining how often you want the System to generate
            the CC-180/CM-180, Cardholder Recap Summary Report. Max length can be
            1 characters.
          example: TEST0002
        annualFeeAmount:
          type: string
          description:
            Amount of annual fee billed to each cardholder within the company.
            Max length can be 13 characters.
          example: '999999999.99'
        inactiveMonthsCount:
          type: string
          description:
            Count of months a particular enhanced credit protection product
            has been in claimant status for a cardholder. Max length can be 2 characters.
          example: '12'
        reportFeeAmount:
          type: string
          description:
            Whole-dollar amount charged to the company for more than the
            default number of report copies. Max length can be 11 characters.
          example: '999999999'
        billingAccountIdentifier:
          type: string
          description: Identifier of the billing cccount. Max length can be 16 characters.
          example: '9999999999999'
        companyContactPhoneIdentifier:
          type: string
          description: Company contact phone identifier. Max length can be 19 characters.
          example: '9999999999999999'
        yearEstablishedDate:
          type: string
          description: Year the company was established. Valid length is 4 digits.
          example: '2004'
        employeeCount:
          type: string
          description:
            Number of Employees associated with the company. Valid length
            is 5 digits.
          example: '99999'
        infoSpanIndicator:
          type: string
          description:
            Indicator designating whether a client is an InfoSpan user
