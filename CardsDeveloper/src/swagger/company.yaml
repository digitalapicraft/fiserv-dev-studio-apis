    Summary:
      type: object
      properties:
        companyIdentifier:
          type: string
          description: Identifier of the company.
          example: TEST0002
        companyName:
          type: string
          description: Name of the company.
          example: Fiserv
        systemIdentifier:
          type: string
          description:
            First Data-assigned identifier which is used to group principal
            identifiers together for processing and reporting.
          example: '3771'
        principalIdentifier:
          type: string
          description:
            Client-defined identifier within a system identifier that is
            used to group agent identifiers together for processing and reporting.
          example: '0050'
        agentIdentifier:
          type: string
          description:
            Client-defined identifier within a principal identifier that
            is used to group accounts together for processing and reporting.
          example: '0000'
        institutionName:
          type: string
          description: Issuer-defined name representing your institution.
          example: 360 FEDERAL CREDIT UNION
        productName:
          type: string
          description: Name of the product.
          example: 360 FCU VISA BUSINESS
        companyCreditLine:
          type: string
          description: Amount of maximum credit extended to the company account.
          example: '100000'
        companyAvailableCreditAmount:
          type: string
          description: Amount of a company’s available credit.
          example: '86489'
        companyContactTelephoneNumber:
          type: string
          description: Telephone number of contact person at the company.
          example: '9898989898'
        openDate:
          type: string
          description: Date on which the company was created.
          example: '2020-07-15T00:00:00.000+0000'
        lastChangeDate:
          type: string
          description:
            Date on which the last change was made to the Company card
            master file.
          example: '2021-09-17T00:00:00.000+0000'
        billingCycleCode:
          type: string
          description: Code determining when the account statement is generated.
          example: '03'
        annualFeeAmount:
          type: string
          description: Amount of the annual fee.
          example: '0.0'
        statementOptionCode:
          type: string
          description:
            Code determining whether company account statements are sent
            directly to the issuer or to the customers.
          example: SEND_STATEMENTS_TO_ISSUER
          enum:
            - SEND_STATEMENTS_TO_ISSUER
            - SEND_STATEMENTS_TO_CUSTOMER
        paperStatementSuppressCode:
          type: string
          description:
            Code representing the type(s) of company-related commercial
            card accounts for which the production of paper billing statements is
            suppressed. The paper billing statement suppression option is available
            only for commercial card clients who use the Strategic Communications
            Solution (SCS) platform to create billing statements, including those
            who use flexible billing.
          example: DO_NOT_SUPPRESS
          enum:
            - DO_NOT_SUPPRESS
            - SUPPRESS_FOR_ALL_ACCOUNTS
            - SUPPRESS_FOR_CONTROL_ACCOUNTS
            - SUPPRESS_FOR_SUBORDINATE_ACCOUNTS
            - SUPPRESS_FOR_INDIVIDUAL_ACCOUNTS
        companyLastBillingDate:
          type: string
          description:
            Date when the company completed its most recent billing period.
            It displays zeros if the company does not participate in VCF/InfoSpan
            reporting.
          example: '2024-01-17T00:00:00.000+0000'
        companyNextBillingDate:
          type: string
          description:
            Projected date when the company’s current billing period will
            end, which is when the system will generate this date. This field displays
            zeros if the company does not participate in VCF/InfoSpan reporting.
          example: '2024-02-17T00:00:00.000+0000'
        companyContactName:
          type: string
          description: Name of the contact person at the company.
          example: David
        principalOfficerName:
          type: string
          description: Name of the principal officer of the company.
          example: Clara
        businessType:
          type: string
          description: Type of the business that company is dealing in.
          example: ASSOCIATIONS
          enum:
            - LIMITED_PARTNERSHIP
            - ASSOCIATIONS
            - CORPORATION
            - GOVERNMENT
            - LIMITED_LIABILITY_COMPANY
            - NOT_FOR_PROFIT
            - PARTNERSHIP
            - REGISTERED_CHARITIES
            - SOLE_PROPRIETOR
            - TRUSTS
            - UNLIMITED_LIABILITY_CORPORATIONS
        goodAccountOutstandingBalanceAmount:
          type: string
          description:
            Good account outstanding balance amount is the whole-dollar
            amount of the company account’s unpaid balance for cardholder accounts
            in good standing.
          example: '13511'
        externallyStatusedAccountsOutstandingBalance:
          type: string
          description:
            Externally statused accounts outstanding balance is the whole-dollar
            amount of the company account’s unpaid balance for cardholder accounts
            with an external status.
          example: '0'
        companyCreditLineExceptionPercentage:
          type: string
          description:
            Percentage of the company credit line that the current balance
            must equal or exceed to appear in the COMPANY_CREDIT_LINE_EXCEPTION view.
          example: '100'
        cardholderCreditLineExceptionPercentageRate:
          type: string
          description:
            Percentage of individual cardholder credit line that the current
            balance must equal or exceed for reporting purposes.
          example: '100'
        federalTaxFormTaxTypeCode:
          type: string
          description: Code representing the type of tax identifier.
          example: SOCIAL_SECURITY
          enum:
            - TAX_ID
            - SOCIAL_SECURITY
            - EIN
        federalTaxIdentifier:
          type: string
          description:
            Represents the value of federal tax form tax type code. Max
            length for EIN & TAX_ID can be 24 & for SOCIAL_SECURITY, max length can
            be 9 digit.
          example: '981231256'
        averageCardholderBalanceAmount:
          type: string
          description: Amount of the average cardholder balance within the company.
          example: '3466'
        goodAccountMaximumCreditLineAmount:
          type: string
          description:
            Good Account Maximum Credit Line Amount is Whole-dollar amount
            of maximum credit extended to accounts in good standing.
          example: '597600'
        externallyStatusedAccountsMaximumCredit:
          type: string
          description:
            Externally statused accounts maximum credit is the whole-dollar
            amount of maximum credit extended to accounts with an external status.
          example: '11250'
        contractExpirationDate:
          type: string
          description: Date when the company contract expires.
          example: 2099-12
        goodAccountsCount:
          type: string
          description: Count of the cardholder's accounts in good standing.
          example: '33'
        externallyStatusedAccountsCount:
          type: string
          description: Count of the cardholder accounts with an external status.
          example: '0'
        fiscalYearEndCode:
          type: string
          description: Code representing the month in which the fiscal year ends.
          example: JAN
          enum:
            - JAN
            - FEB
            - MAR
            - APR
            - MAY
            - JUN
            - JUL
            - AUG
            - SEP
            - OCT
            - NOV
            - DEC
        generalLedgerCostCenterIdentifier:
          type: string
          description:
            Identifier of the cost center used for the respective Transaction
            Account Number (TAN)transaction.
          example: A32424RTRTREQW2311413241
        cdfIndicator:
          type: string
