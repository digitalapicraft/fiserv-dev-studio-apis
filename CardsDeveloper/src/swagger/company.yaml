  - name: Add
    description: Add Resources that are applicable
  - name: Details
    description: Details Resources that are applicable
  - name: Notes
    description: Company Memo Resources that are applicable
  - name: Demographics
    description: Company Demographics Resources that are applicable
  - name: Accounts
