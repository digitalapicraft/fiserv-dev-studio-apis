paths:
  '/v1/id/search':
    post:
      tags:
        - Details
      description: |-
        This method is used to get a company's details by using a combination of company, system, principal & agent identifier.
                <br><br>
                For more information go to <a href="/product/CardDeveloper/docs/?path=docs/resources.md/#company" title="Click to open">Resources.</a>
      operationId: getCompanyInfo
      parameters:
        - name: x-fapi-userId
          in: header
          description:
            User on behalf of whom the request is being made. userId must
            be alphanumeric.
          required: false
          style: simple
          explode: false
          schema:
            type: string
          example: JOHNDOE
        - name: x-fapi-financial-id
          in: header
          description:
            The 8-digit unique financial institute id assigned to each FI
            by Fiserv.
          required: true
          style: simple
          explode: false
          schema:
            type: string
          example: '0012345678'
      requestBody:
        description: CompanyIdSearch
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/CompanyIdSearchRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/CompanyIdSearchResponse'
              example:
                address:
                  - addressLine1: '123 ANY STREET'
                    addressLine2: 'APT 100'
                    addressLine3: 'PARSIPPANY'
                    addressLine4: 'NJ'
                    country: 'USA'
                    state: 'NJ'
                    zipCode: '07054'
                    city: 'PARSIPPANY'
