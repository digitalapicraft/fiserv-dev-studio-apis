              '$ref': '#/components/schemas/CompanySearchRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/CompanyNameResponse'
              example:
                summary:
                  - agentIdentifier: '0000'
                    companyCreditLine: '100000'
                    companyIdentifier: 'TEST0002'
                    companyName: 'Fiserv'
                    goodAccountsCount: '36'
                    principalIdentifier: '0050'
