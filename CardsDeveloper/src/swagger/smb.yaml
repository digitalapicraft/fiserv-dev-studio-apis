components:
  schemas:
    SMBCardsSearchRequest:
      title: SMBCardSearchRequest
      required:
        - bin
        - companyId
      type: object
      properties:
        responseFormat:
          type: string
          description:
            Determines how the user wants to see the response - masked
            or unmasked. This is an optional field and if not provided, then MASKED
            will be the default value.
          example: MASKED
          enum:
            - MASKED
            - UNMASKED
        companyId:
          maxLength: 8
          minLength: 8
          type: string
          description: A unique identifier assigned to a company.
          example: '12345678'
        bin:
          maxLength: 12
          minLength: 6
          type: string
          description:
            Bank Identification Number of the FI. The BIN enables card
            networks and processors to determine how to route transactions, apply
            appropriate rules, and authenticate the card type and issuer.
          example: '123456'
        cardContext:
          maxLength: 300
          type: string
          description:
            This value appears in the response when there are more than
            75 cardholder records. As part of the subsequent request to retrieve the
            next set of cardholder records this value must be sent. If this field
            is not present in response, no additional records are available.
          example: U2QAAAAAAAAAAAAAAAYAAAAGAAAABgAAAAZBSwAIbwoAAAAAAAAAAAAAADcwMDAwMDg4OEUwNzYzMjQ4MDQ0MzAyNDcwMTQyODQ0MzAyNDcwMTQyODA5NjkgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAg
    SMBCardsSearchResponse:
      title: SMBCardSearchResponse
      properties:
        count:
          type: string
          description:
            Represents the total number of card records returned in the
            response.
          example: '3'
        moreRecords:
          type: string
          description: Indicates if additional cards records are present to be displayed
          example: 'true'
          enum:
            - 'Yes'
            - 'No'
        cardContext:
          maxLength: 300
          type: string
          description:
            This value appears in the response when there are more than
            75 cardholder records. As part of the subsequent request to retrieve the
            next set of cardholder records this value must be sent. If this field
            is not present in response, no additional records are available.
          example: U2QAAAAAAAAAAAAAAAYAAAAGAAAABgAAAAZBSwAIbwoAAAAAAAAAAAAAADcwMDAwMDg4OEUwNzYzMjQ4MDQ0MzAyNDcwMTQyODQ0MzAyNDcwMTQyODA5NjkgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAg
        cardList:
          type: array
          description: List of cards associated with the company.
          items:
            '$ref': '#/components/schemas/cardDetails'
    cardDetails:
      title: cardDetails
      properties:
        bin:
          maxLength: 12
          minLength: 6
          type: string
          description:
            Bank Identification Number of the FI. The BIN enables card
            networks and processors to determine how to route transactions, apply
            appropriate rules, and authenticate the card type and issuer.
          example: '123456'
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description:
            This field contains the Primary Account Number (PAN) assigned
            to the cardholder record, uniquely identifying the cardholder’s card account.
            This will be displayed as per the response format provided in request.
          example: 400010XXXXXX3000
        cardMemberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description:
            his field contains the member identifier associated with the
            card, derived from the card prefix configuration. It applies only to debit
            cards. This identifier helps distinguish between multiple cardholders
            linked to the same account and supports accurate routing of activation
            logic and cardholder-specific processing.
          format: numeric
          example: '1'
        cardholderName:
          maxLength: 26
          type: string
          description: Name of the cardholder
          format: alphanumeric
          example: Doe, John M
        cardExpiryDate:
          type: string
          description:
            This field specifies the expiration date of the card in MM/YY
            format. It indicates when the card is set to expire and is used for card
            validity checks, renewal processes, and account maintenance activities.
          format: MM/YY
          example: 10/23
        cardStatus:
          type: string
          description:
            "This field specifies the current lifecycle status of the card
            at the portfolio or plastic level. It helps determine how the card is
            managed across systems, including activation, usage, restrictions, and
            deactivation.\n \nSupported values \n- ACTIVE – Card is active and available
            for use\n- CAPTURE – Card is captured and no longer usable\n- DEACTIVATE
            – Card is deactivated and cannot be used\n- ISSUED – Card has been issued
            but not yet activated\n- RESTRICTED – Card has limited functionality due
            to restrictions"
          example: ACTIVE
          enum:
            - ACTIVE
            - CAPTURE
            - DEACTIVATE
            - ISSUED
            - RESTRICTED
        statusReasoncode:
          type: string
          description:
            "This field specifies the reason for the current status of
            the selected card. It is required when updating the card status to CAPTURE
            or DEACTIVATE.\n \nSupported values \n- NONE – No specific reason provided\n-
            CLOSED – Account or card is closed\n-CUSTOMER_REQUEST – Status change
            requested by the customer\n- LOST – Card reported as lost\n- STOLEN –
            Card reported as stolen\n- ABUSED – Card misused or abused\n- DAMAGED
            – Card is physically damaged\n- REVOKED – Card revoked by the issuer"
          example: NONE
          enum:
            - NONE
            - CLOSED
            - CUSTOMER_REQUEST
            - LOST
            - STOLEN
            - ABUSED
            - DAMAGED
            - REVOKED
        companyId:
          maxLength: 8
          minLength: 8
          type: string
          description: A unique identifier assigned to a company.
          format: numeric
          example: '12345678'
        companyRole:
          type: string
          description:
            "Role of the cardholder in the company .\n \nPossible values
            \n- O  -  Owner\n- E  -  Employer"
          example: O
    SMBNameSearchRequest:
      title: SMBNameSearchRequest
      required:
        - companyName
      type: object
      properties:
        companyName:
          maxLength: 40
          minLength: 3
          type: string
          description: Name of the company.
          example: ABC
        companyContext:
          maxLength: 300
          type: string
          description:
            This value appears in the response when there are more than
            75 company records. As part of the subsequent request to retrieve the
            next set of company records this value must be sent. If this field is
